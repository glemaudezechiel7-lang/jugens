<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produits - C.E.P.S</title>
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <link rel="stylesheet" href="pcss/styleindex.css">
</head>
<body>

  <!-- HEADER -->
 <header>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold d-flex align-items-center" href="index.html">
        <img src="image/logo_ces.jpeg" alt="Logo ceps" width="50" height="50" class="me-2">
        CENTRE D'ÉQUIPEMENT & PRODUITS DE SANTÉ
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-center">
          <li class="nav-item"><a class="nav-link" href="index.html">Accueil</a></li>
          <li class="nav-item"><a class="nav-link" href="produit.html">Produit</a></li>
          <!-- Panier avec compteur -->
          <li class="nav-item">
            <a class="nav-link position-relative" href="panier.html">
              <i class="bi bi-cart-fill fs-5"></i>
              <span id="cart-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-success">
                0
              </span>
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
</header>


  <!-- PRODUITS -->
  <main class="container my-5">
    <h2 class="text-center mb-4">Tous nos Produits</h2>
    <div class="row">
      <!-- Exemple de produit -->
      <div class="col-md-3 mb-4">
        <div class="card">
          <img src="image/coton_sterile.jpeg" class="card-img-top" alt="Coton stérile">
          <div class="card-body text-center">
            <h5 class="card-title">Coton Stérile</h5>
            <p class="card-text">Prix : 5€</p>
            <button class="btn btn-primary add-to-cart" data-name="Coton Stérile" data-price="5">Ajouter au panier</button>
          </div>
        </div>
      </div>

      <div class="col-md-3 mb-4">
        <div class="card">
          <img src="image/glucometre.jpeg" class="card-img-top" alt="Glucomètre">
          <div class="card-body text-center">
            <h5 class="card-title">Glucomètre</h5>
            <p class="card-text">Prix : 25€</p>
            <button class="btn btn-primary add-to-cart" data-name="Glucomètre" data-price="25">Ajouter au panier</button>
          </div>
        </div>
      </div>

      <div class="col-md-3 mb-4">
        <div class="card">
          <img src="image/berocca.jpeg" class="card-img-top" alt="Berocca Boost">
          <div class="card-body text-center">
            <h5 class="card-title">Berocca Boost</h5>
            <p class="card-text">Prix : 12€</p>
            <button class="btn btn-primary add-to-cart" data-name="Berocca Boost" data-price="12">Ajouter au panier</button>
          </div>
        </div>
      </div>

      <div class="col-md-3 mb-4">
        <div class="card">
          <img src="image/apaisyl.jpeg" class="card-img-top" alt="Apaisyl Anti-Poux">
          <div class="card-body text-center">
            <h5 class="card-title">Apaisyl Anti-Poux</h5>
            <p class="card-text">Prix : 9€</p>
            <button class="btn btn-primary add-to-cart" data-name="Apaisyl Anti-Poux" data-price="9">Ajouter au panier</button>
          </div>
        </div>
      </div>

      <!-- Tu peux continuer à ajouter autant de produits que tu veux -->
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="bg-dark text-white text-center p-3">
    <p>&copy; 2026 C.E.P.S - Tous droits réservés</p>
  </footer>

 <script>
  // Fonction pour mettre à jour le compteur
  function updateCartCount() {
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    document.getElementById('cart-count').textContent = cart.length;
  }

  // Mise à jour initiale au chargement
  updateCartCount();

  // Gestion des boutons "Ajouter au panier"
  const buttons = document.querySelectorAll('.add-to-cart');
  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      let cart = JSON.parse(localStorage.getItem('cart')) || [];
      const product = { name: btn.dataset.name, price: parseFloat(btn.dataset.price) };
      cart.push(product);
      localStorage.setItem('cart', JSON.stringify(cart));
      updateCartCount();
      alert(product.name + " ajouté au panier !");
    });
  });
</script>

</body>
</html>
